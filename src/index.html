<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-shell">
        <section class="container" aria-label="Number guessing game">
            <p class="eyebrow">Quick Brain Game</p>
            <h1>Number Guessing Game</h1>
            <p class="subtitle">Pick a number from 1 to 100 and see how fast you can crack it.</p>

            <div class="guess-row">
                <input type="number" id="guessInput" min="1" max="100" placeholder="Enter your guess" aria-label="Enter your guess">
                <button id="submitGuess">Submit Guess</button>
            </div>

            <div class="status-panel">
                <div id="message">Guess a number between 1 and 100</div>
                <div id="attempts">Attempts: 0</div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
